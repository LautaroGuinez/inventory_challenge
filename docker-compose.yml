version: '3.8'

services:
  
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: inventory_challenge
      MYSQL_USER: challenge_user
      MYSQL_PASSWORD: challenge_pass
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=mysql://challenge_user:challenge_pass@db:3306/inventory_challenge
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MOCK_API_URL=http://host.docker.internal:8080 
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started